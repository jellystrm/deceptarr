# Production compose — single image, backend serves pre-built Vue SPA.
# Copy to docker-compose.yml, fill in your values, then: docker compose up -d
# All env vars are documented in .env.example

services:
  deceptarr:
    image: ghcr.io/jellystrm/deceptarr:latest
    container_name: deceptarr
    restart: unless-stopped
    env_file:
      - .env                          # copy .env.example → .env and customise
    ports:
      - "${UI_PORT:-8765}:${UI_PORT:-8765}"
    volumes:
      - ./config:/config              # settings (config.json)
      - ./appdata:/app/appdata        # state / job store
      - ./downloads:/downloads        # must match qBittorrent save path
      - ./movies:/movies              # must match Radarr root folder / Jellyfin library
      - ./shows:/shows                # must match Sonarr root folder / Jellyfin library
    networks:
      - media

networks:
  media:
    external: true
