# Production compose — single image, backend serves pre-built Vue SPA.

services:
  deceptarr:
    image: deceptarr:latest
    container_name: deceptarr
    restart: unless-stopped
    environment:
      # Only TMDB_API_KEY is required (get free at themoviedb.org)
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      
      # Optional: Override auto-detected service URLs (usually not needed)
      # - PUBLIC_BASE_URL=http://localhost:8765
      
      # Optional: Override auto-generated Torznab API key
      # - TORZNAB_API_KEY=${TORZNAB_API_KEY:-deceptarr}
      
      # Optional: Server labels for differentiating releases
      # - SERVER_LABELS=ViệtSub,Lồng Tiếng
      
      # Optional: Output settings
      # - DEFAULT_OUTPUT_MODE=strm
      # - EXPOSE_BOTH_MODES=true
      # - DOWNLOAD_CONTAINER=mkv
      
      # Optional: Polling settings
      # - POLL_INTERVAL_SECONDS=300
      
      # Optional: Log level
      # - LOG_LEVEL=INFO
      
      # Optional: UI port (default 8765)
      # - UI_PORT=${UI_PORT:-8765}
    volumes:
      # Config directory - all settings stored here
      - ./config:/config
      
      # Download folder - must match Radarr/Sonarr download path
      - ./downloads:/downloads
      
      # Movie/Series library paths - must match Jellyfin library paths
      - ./movies:/movies
      - ./shows:/shows
    ports:
      - "8765:8765"
    networks:
      - media

networks:
  media:
    external: true